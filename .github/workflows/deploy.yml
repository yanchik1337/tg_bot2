name: bot deploy
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: |
            dist/
            package.json
            package-lock.json
            docker-compose.yml
            Dockerfile

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download-artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: dist-build

      - name: copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          source: "dist-build/dist,dist-build/package.json,dist-build/package-lock.json,dist-build/docker-compose.yml,dist-build/Dockerfile"
          target: "~/tg_bot2"
          strip_components: 1
          rm: true

      - name: compose up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/tg_bot2
            docker compose up -d --build
